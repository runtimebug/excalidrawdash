name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Placeholders so the build never touches a real database or secret —
          # no DB calls happen at build time (mirrors the Dockerfile).
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          AUTH_SECRET: build-time-placeholder-secret-value-000000
